# Application Configuration
spring.application.name=VoxChain

# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/voting_system?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

# H2 Console (disabled — using MySQL now)
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
spring.sql.init.mode=never

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server Configuration
server.port=8080

# Web3j / Blockchain Configuration
web3j.client-address=http://127.0.0.1:8545
blockchain.contract-address=YOUR_CONTRACT_ADDRESS_HERE
blockchain.admin-private-key=YOUR_ADMIN_PRIVATE_KEY_HERE

# Admin Credentials
admin.username=admin
admin.password=admin123
